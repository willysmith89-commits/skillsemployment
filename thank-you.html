<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanks — we'll be in touch | Skills &amp; Employment Australia</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Source Sans 3',sans-serif;background:#F4F7F6;color:#102A33;display:grid;place-items:center;min-height:100vh;padding:24px;box-sizing:border-box}
.card{background:#fff;border:1px solid #dde5e3;border-radius:20px;max-width:560px;padding:48px 42px;text-align:center;box-shadow:0 10px 30px rgba(15,42,67,.10)}
.tick{width:72px;height:72px;border-radius:50%;background:#0E6B6B;color:#fff;display:grid;place-items:center;font-size:2rem;margin:0 auto 22px}
h1{font-family:'Poppins',sans-serif;color:#102A33;font-size:1.6rem;margin:0 0 12px}
p{line-height:1.6;color:#4e646c;margin:0 0 14px}
a.btn{display:inline-block;margin-top:10px;background:#EE6C4D;color:#fff;text-decoration:none;font-family:'Poppins',sans-serif;font-weight:600;padding:13px 30px;border-radius:999px}
</style>
</head>
<body>
<div class="card">
  <div class="tick">✓</div>
  <h1>Thanks — we've got your details</h1>
  <p>Our team will confirm your place and email you a secure payment link within one business day.</p>
  <a class="btn" href="/">Back to the course page</a>
</div>
</body>
</html>
